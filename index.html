<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML 刷题 - 机器学习知识题库</title>
<style>
/* ===== CSS 变量（淡蓝主题） ===== */
:root {
  --bg-page: #e3f2fd;
  --bg-card: #ffffff;
  --border-card: #bbdefb;
  --btn-primary: #42a5f5;
  --btn-primary-hover: #1e88e5;
  --btn-primary-active: #1565c0;
  --color-selected: #64b5f6;
  --color-correct: #4caf50;
  --color-wrong: #f44336;
  --text-primary: #212121;
  --text-secondary: #616161;
  --text-light: #ffffff;
  --block-bg: #e3f2fd;
  --block-border: #90caf9;
  --block-hover: #bbdefb;
  --block-selected: #bbdefb;
  --block-selected-border: #42a5f5;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-btn: 0 2px 6px rgba(66,165,245,0.3);
  --radius-card: 16px;
  --radius-btn: 8px;
  --radius-block: 8px;
  --transition: 0.2s ease;
}

/* ===== 全局重置 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

/* ===== 屏幕容器 ===== */
.screen {
  display: none;
  max-width: 860px;
  margin: 24px auto;
  padding: 0 16px;
  animation: fadeIn 0.3s ease;
}
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== 卡片 ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-card);
  padding: 32px;
  box-shadow: var(--shadow-card);
}

/* ===== 首页 ===== */
.home-header {
  text-align: center;
  margin-bottom: 32px;
}
.home-header .logo {
  font-size: 40px;
  margin-bottom: 8px;
}
.home-header h1 {
  font-size: 28px;
  color: var(--btn-primary-hover);
  margin-bottom: 4px;
}
.home-header .subtitle {
  color: var(--text-secondary);
  font-size: 15px;
}

.filter-section {
  margin-bottom: 20px;
}
.filter-section .filter-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  display: block;
}

/* 筛选按钮组 */
.pill-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.pill {
  padding: 8px 18px;
  border: 2px solid var(--border-card);
  border-radius: 20px;
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 14px;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}
.pill:hover { border-color: var(--color-selected); background: #f5f9ff; }
.pill.active {
  background: var(--btn-primary);
  color: var(--text-light);
  border-color: var(--btn-primary);
}

/* 题目数量选择 */
.count-select {
  display: flex;
  align-items: center;
  gap: 12px;
}
.count-select select {
  padding: 8px 14px;
  border: 2px solid var(--border-card);
  border-radius: var(--radius-btn);
  font-size: 14px;
  background: var(--bg-card);
  cursor: pointer;
  outline: none;
}
.count-select select:focus { border-color: var(--btn-primary); }

/* 按钮 */
.btn {
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-btn);
  font-size: 15px;
  cursor: pointer;
  transition: all var(--transition);
  font-weight: 600;
  user-select: none;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--btn-primary);
  color: var(--text-light);
  box-shadow: var(--shadow-btn);
  font-size: 18px;
  padding: 14px 40px;
}
.btn-primary:hover { background: var(--btn-primary-hover); }
.btn-primary:disabled {
  background: #ccc;
  box-shadow: none;
  cursor: not-allowed;
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--btn-primary);
  border: 2px solid var(--btn-primary);
}
.btn-secondary:hover { background: #f0f7ff; }

.btn-small {
  padding: 6px 16px;
  font-size: 13px;
}

.btn-next {
  background: var(--btn-primary);
  color: var(--text-light);
  padding: 12px 32px;
}
.btn-next:hover { background: var(--btn-primary-hover); }

/* 导入区域 */
.import-section {
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.import-info {
  font-size: 13px;
  color: var(--text-secondary);
}

/* 开始按钮容器 */
.start-container {
  text-align: center;
  margin-top: 8px;
}

/* ===== 答题页 ===== */
.quiz-topbar {
  margin-bottom: 20px;
}

/* 进度条 */
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 14px;
  color: var(--text-secondary);
}
.score-display {
  font-weight: 700;
  color: var(--btn-primary);
  font-size: 15px;
}
.progress-bar-outer {
  height: 8px;
  background: #e0e0e0;
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: var(--btn-primary);
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* 题目标头 */
.question-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.badge {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  user-select: none;
}
.badge-difficulty { background: #e3f2fd; color: #1565c0; }
.badge-topic { background: #f3e5f5; color: #7b1fa2; }
.badge-qnum { background: #e8f5e9; color: #2e7d32; }

.question-text {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 20px;
  line-height: 1.7;
}
.question-context {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  padding: 12px 16px;
  background: #fafafa;
  border-radius: var(--radius-btn);
  border-left: 4px solid var(--btn-primary);
}

/* ===== 概念题选项 ===== */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.option-card {
  padding: 14px 18px;
  border: 2px solid var(--border-card);
  border-radius: var(--radius-btn);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 15px;
  user-select: none;
}
.option-card:hover { border-color: var(--color-selected); background: #f5f9ff; }
.option-card.selected { border-color: var(--btn-primary); background: #e3f2fd; }
.option-card.correct { border-color: var(--color-correct); background: #e8f5e9; color: #2e7d32; }
.option-card.wrong { border-color: var(--color-wrong); background: #ffebee; color: #c62828; }
.option-card.disabled { pointer-events: none; opacity: 0.85; }

/* ===== 代码拼图 ===== */
.puzzle-area { margin-bottom: 20px; }

.block-pool, .block-answer {
  min-height: 60px;
  padding: 16px;
  border-radius: var(--radius-btn);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: flex-start;
  transition: all var(--transition);
}

.block-pool {
  background: #fafafa;
  border: 2px dashed var(--border-card);
}
.block-pool:empty::after {
  content: "所有代码块已选完";
  color: var(--text-secondary);
  font-size: 13px;
  width: 100%;
  text-align: center;
  padding: 12px;
}

.block-answer {
  background: #f8fbff;
  border: 2px solid var(--btn-primary);
  min-height: 80px;
  flex-direction: column;
}
.block-answer:empty::after {
  content: "👆 点击上方代码块，按正确顺序排列";
  color: var(--text-secondary);
  font-size: 13px;
  width: 100%;
  text-align: center;
  padding: 16px;
}

.puzzle-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  margin-top: 14px;
}
.puzzle-label:first-child { margin-top: 0; }

.code-block {
  display: inline-block;
  font-family: "Cascadia Code", "Fira Code", "Consolas", "Courier New", monospace;
  font-size: 13px;
  background: var(--block-bg);
  border: 2px solid var(--block-border);
  border-radius: var(--radius-block);
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  transition: all var(--transition);
  white-space: pre-wrap;
  word-break: break-all;
  max-width: 100%;
}
.code-block:hover { background: var(--block-hover); border-color: var(--color-selected); transform: translateY(-1px); }

.block-pool .code-block.used {
  opacity: 0.3;
  pointer-events: none;
  text-decoration: line-through;
}

.block-answer .code-block {
  display: block;
  width: 100%;
  border-color: var(--block-selected-border);
  background: var(--block-selected);
  position: relative;
  padding-left: 36px;
}
.block-answer .code-block::before {
  content: attr(data-order);
  position: absolute;
  left: 8px;
  top: 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--btn-primary);
  font-family: sans-serif;
}
.block-answer .code-block:hover { background: #e3f2fd; }

.code-block.correct-block { border-color: var(--color-correct); background: #e8f5e9; }
.code-block.wrong-block { border-color: var(--color-wrong); background: #ffebee; }

/* ===== 反馈区域 ===== */
.feedback-area {
  margin-top: 16px;
  padding: 16px 20px;
  border-radius: var(--radius-btn);
  display: none;
  animation: fadeIn 0.3s ease;
}
.feedback-area.show { display: block; }
.feedback-area.correct { background: #e8f5e9; border: 1px solid #a5d6a7; }
.feedback-area.wrong { background: #fff3e0; border: 1px solid #ffcc02; }
.feedback-area .feedback-icon { font-size: 24px; margin-right: 8px; }
.feedback-area .explanation { margin-top: 8px; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

/* ===== 答题按钮区 ===== */
.quiz-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* ===== 结果页 ===== */
.results-header {
  text-align: center;
  margin-bottom: 24px;
}
.results-header .big-icon { font-size: 56px; }
.results-header .big-score {
  font-size: 48px;
  font-weight: 800;
  color: var(--btn-primary);
}
.results-header .big-total { font-size: 20px; color: var(--text-secondary); }
.results-header .grade {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 24px;
  border-radius: 20px;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-light);
}
.grade-a { background: #4caf50; }
.grade-b { background: #8bc34a; }
.grade-c { background: #ff9800; }
.grade-d { background: #ff5722; }
.grade-f { background: #f44336; }

.breakdown-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 600px) { .breakdown-grid { grid-template-columns: 1fr; } }

.breakdown-card {
  background: #fafafa;
  border-radius: var(--radius-btn);
  padding: 16px;
}
.breakdown-card h3 {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.breakdown-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 14px;
  border-bottom: 1px solid #eee;
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-row .b-score { font-weight: 600; }

.review-section { margin-bottom: 24px; }
.review-section h3 {
  font-size: 16px;
  margin-bottom: 12px;
  color: var(--text-primary);
}
.review-item {
  border: 1px solid var(--border-card);
  border-radius: var(--radius-btn);
  margin-bottom: 8px;
  overflow: hidden;
}
.review-item-header {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #fafafa;
  user-select: none;
  font-size: 14px;
}
.review-item-header:hover { background: #f0f0f0; }
.review-item-header .review-icon {
  font-size: 12px;
  color: var(--text-secondary);
  transition: transform 0.2s;
}
.review-item.open .review-item-header .review-icon { transform: rotate(180deg); }
.review-item-body {
  display: none;
  padding: 16px;
  border-top: 1px solid #eee;
  font-size: 14px;
}
.review-item.open .review-item-body { display: block; }
.review-item-body .rv-label {
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: 8px;
}
.review-item-body .rv-label:first-child { margin-top: 0; }
.review-item-body .rv-correct { color: var(--color-correct); }
.review-item-body .rv-wrong { color: var(--color-wrong); }

.results-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ===== 响应式 ===== */
@media (max-width: 500px) {
  .card { padding: 20px 16px; }
  .home-header h1 { font-size: 22px; }
  .big-score { font-size: 36px; }
  .pill { padding: 6px 14px; font-size: 13px; }
  .btn-primary { padding: 12px 28px; font-size: 16px; }
  .code-block { font-size: 12px; padding: 8px 10px; }
}

/* ===== 提示文字 ===== */
.hint-text {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.warn-text {
  color: #e65100;
  font-size: 13px;
  margin-top: 8px;
  display: none;
}
.warn-text.show { display: block; }
</style>

</head>
<body>

<!-- ========== 屏幕 1：首页 ========== -->
<section class="screen active" id="screen-home">
  <div class="card">
    <div class="home-header">
      <div class="logo">🧠</div>
      <h1>ML 刷题</h1>
      <p class="subtitle">机器学习基础知识题库 — 概念 + 代码拼图</p>
    </div>

    <div class="filter-section">
      <span class="filter-label">📊 难度筛选</span>
      <div class="pill-group" id="difficulty-pills">
        <span class="pill active" data-value="all">全部</span>
        <span class="pill" data-value="easy">🟢 简单</span>
        <span class="pill" data-value="medium">🟡 中等</span>
        <span class="pill" data-value="hard">🔴 困难</span>
      </div>
    </div>

    <div class="filter-section">
      <span class="filter-label">📚 知识点（可多选，不选=全选）</span>
      <div class="pill-group" id="topic-pills">
        <span class="pill active" data-value="基础概念">基础概念</span>
        <span class="pill active" data-value="经典算法">经典算法</span>
        <span class="pill active" data-value="神经网络基础">神经网络基础</span>
      </div>
    </div>

    <div class="filter-section">
      <span class="filter-label">📝 题目数量</span>
      <div class="count-select">
        <select id="question-count">
          <option value="10">10 题</option>
          <option value="20" selected>20 题</option>
          <option value="30">30 题</option>
          <option value="50">50 题</option>
          <option value="all">全部题目</option>
        </select>
        <span class="import-info" id="available-info">（可用题库：0 道）</span>
      </div>
    </div>

    <div class="import-section">
      <button class="btn btn-secondary btn-small" id="btn-import">📥 导入自定义题库</button>
      <input type="file" accept=".json" id="import-file" hidden>
      <span class="import-info" id="import-status"></span>
    </div>

    <div class="warn-text" id="filter-warn">⚠️ 当前筛选条件下没有匹配的题目，请调整筛选条件。</div>

    <div class="start-container">
      <button class="btn btn-primary" id="btn-start">🚀 开始刷题</button>
    </div>
  </div>
</section>

<!-- ========== 屏幕 2：答题页 ========== -->
<section class="screen" id="screen-quiz">
  <div class="card">
    <div class="quiz-topbar">
      <div class="progress-info">
        <span id="progress-text">第 1/10 题</span>
        <span class="score-display" id="score-display">得分：0</span>
      </div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width: 0%"></div>
      </div>
    </div>

    <div class="question-meta" id="question-meta"></div>
    <div class="question-text" id="question-text"></div>
    <div class="question-context" id="question-context" style="display:none;"></div>

    <!-- 动态填充的题目内容 -->
    <div id="question-content"></div>

    <!-- 反馈区域 -->
    <div class="feedback-area" id="feedback-area">
      <span class="feedback-icon"></span>
      <span id="feedback-msg"></span>
      <div class="explanation" id="explanation-text"></div>
    </div>

    <!-- 操作按钮 -->
    <div class="quiz-actions">
      <button class="btn btn-primary" id="btn-submit" disabled>✅ 提交答案</button>
      <button class="btn btn-secondary" id="btn-skip">⏭ 跳过</button>
      <button class="btn btn-next" id="btn-next" style="display:none;">下一题 ➡</button>
    </div>
  </div>
</section>

<!-- ========== 屏幕 3：结果页 ========== -->
<section class="screen" id="screen-results">
  <div class="card">
    <div class="results-header">
      <div class="big-icon" id="result-icon">🎉</div>
      <div>
        <span class="big-score" id="result-score">0</span>
        <span class="big-total" id="result-total">/10</span>
      </div>
      <div style="margin-top:4px;color:var(--text-secondary);" id="result-percent">0%</div>
      <div class="grade" id="result-grade">-</div>
    </div>

    <div class="breakdown-grid">
      <div class="breakdown-card" id="breakdown-difficulty">
        <h3>📊 按难度</h3>
      </div>
      <div class="breakdown-card" id="breakdown-topic">
        <h3>📚 按知识点</h3>
      </div>
    </div>

    <div class="review-section">
      <h3>🔍 错题回顾</h3>
      <div id="review-list"></div>
    </div>

    <div class="results-actions">
      <button class="btn btn-primary" id="btn-play-again">🔄 再来一次</button>
      <button class="btn btn-secondary" id="btn-home">🏠 返回首页</button>
    </div>
  </div>
</section>


<script>
(function() {
  'use strict';

  // ============================================================
  // 工具函数
  // ============================================================
  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ============================================================
  // 题库（200道）
  // ============================================================
  const DEFAULT_QUESTIONS = [
  {
    "id": "c_basic_001",
    "type": "concept",
    "difficulty": "easy",
    "topic": "基础概念",
    "question": "下面哪一项最准确地描述了监督学习的特点？",
    "options": [
      "A. 模型从未标注数据中发现隐藏模式",
      "B. 模型从带有标签的训练数据中学习映射关系",
      "C. 模型通过与环境交互获得奖励信号来学习",
      "D. 模型仅使用输入特征本身进行聚类"
    ],
    "correct": 1,
    "explanation": "监督学习的核心特点是训练数据包含特征和对应的标签，模型学习从输入到输出的映射关系。"
  },
  {
    "id": "c_basic_002",
    "type": "concept",
    "difficulty": "easy",
    "topic": "基础概念",
    "question": "以下哪个任务属于无监督学习？",
    "options": [
      "A. 根据房屋面积和楼层预测房价",
      "B. 判断一封邮件是否为垃圾邮件",
      "C. 将客户按购买行为自动分为不同群体",
      "D. 识别图片中的手写数字"
    ],
    "correct": 2,
    "explanation": "客户分群（聚类）是无监督学习的典型应用，数据没有预定义的标签，模型自动发现数据中的结构。"
  },
  {
    "id": "c_basic_003",
    "type": "concept",

  // ============================================================
  // DataStore
  // ============================================================
  const DataStore = {
    questions: [],
    filtered: [],
    quizSet: [],
    currentIndex: 0,
    answers: [],
    score: 0,
    settings: { difficulty: 'all', topics: ['基础概念', '经典算法', '神经网络基础'], questionCount: 20 },
    puzzleState: null,
    submitted: false,
    resetQuiz() {
      this.currentIndex = 0;
      this.answers = [];
      this.score = 0;
      this.puzzleState = null;
      this.submitted = false;
    }
  };

  // ============================================================
  // QuestionBank
  // ============================================================
  const QuestionBank = {
    loadDefaults() {
      DataStore.questions = DEFAULT_QUESTIONS.map(function(q) { return Object.assign({}, q); });
      return DataStore.questions.length;
    },
    importFromJSON(json) {
      if (!json || !Array.isArray(json.questions)) {
        return { success: false, error: 'JSON 格式错误：缺少 questions 数组。', count: 0 };
      }
      var added = 0;
      var errors = [];
      var self = this;
      json.questions.forEach(function(q, i) {
        var err = self.validateQuestion(q);
        if (err) { errors.push('第 ' + (i + 1) + ' 题：' + err); }
        else { DataStore.questions.push(Object.assign({}, q)); added++; }
      });
      return { success: errors.length === 0, errors: errors, count: added };
    },
    validateQuestion(q) {
      if (!q || typeof q !== 'object') return '题目数据格式错误';
      if (!q.id || !q.type || !q.difficulty || !q.topic || !q.question || !q.explanation) {
        return '缺少必填字段（id, type, difficulty, topic, question, explanation）';
      }
      if (['easy', 'medium', 'hard'].indexOf(q.difficulty) === -1) return '难度值无效：' + q.difficulty;
      if (['基础概念', '经典算法', '神经网络基础'].indexOf(q.topic) === -1) return '知识点无效：' + q.topic;
      if (q.type === 'concept') {
        if (!Array.isArray(q.options) || q.options.length !== 4) return '概念题必须有恰好 4 个选项';
        if (typeof q.correct !== 'number' || q.correct < 0 || q.correct > 3) return 'correct 必须是 0-3';
      } else if (q.type === 'codepuzzle') {
        if (!Array.isArray(q.correct_blocks) || q.correct_blocks.length === 0) return 'correct_blocks 必须是非空数组';
        if (!Array.isArray(q.distractor_blocks)) return 'distractor_blocks 必须是数组';
      } else {
        return '未知题目类型：' + q.type;
      }
      return null;
    },
    filter(difficulty, topics) {
      var pool = DataStore.questions.slice();
      if (difficulty && difficulty !== 'all') {
        pool = pool.filter(function(q) { return q.difficulty === difficulty; });
      }
      if (topics && topics.length > 0) {
        pool = pool.filter(function(q) { return topics.indexOf(q.topic) !== -1; });
      }
      DataStore.filtered = pool;
      return pool;
    },
    selectRandom(n, pool) {
      var source = pool || DataStore.filtered;
      var shuffled = shuffleArray(source);
      if (n === 'all' || n >= source.length) return shuffled;
      return shuffled.slice(0, n);
    }
  };

  // ============================================================
  // UIRenderer
  // ============================================================
  var UIRenderer = {
    showScreen: function(name) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
      var target = document.getElementById('screen-' + name);
      if (target) target.classList.add('active');
    },
    updateAvailableCount: function() {
      var el = document.getElementById('available-info');
      if (el) el.textContent = '（可用题库：' + DataStore.questions.length + ' 道）';
    },
    updateFilterWarn: function() {
      var filtered = QuestionBank.filter(DataStore.settings.difficulty, DataStore.settings.topics);
      var warn = document.getElementById('filter-warn');
      var btn = document.getElementById('btn-start');
      if (filtered.length === 0) { warn.classList.add('show'); btn.disabled = true; }
      else { warn.classList.remove('show'); btn.disabled = false; }
    },
    renderQuiz: function(question) {
      DataStore.puzzleState = null;
      DataStore.submitted = false;
      var fb = document.getElementById('feedback-area');
      fb.classList.remove('show', 'correct', 'wrong');
      document.getElementById('btn-submit').disabled = true;
      document.getElementById('btn-submit').style.display = '';
      document.getElementById('btn-skip').style.display = '';
      document.getElementById('btn-next').style.display = 'none';
      this.updateProgress();
      this._renderQuestionMeta(question);
      this._renderQuestionText(question);
      if (question.type === 'concept') this.renderConcept(question);
      else if (question.type === 'codepuzzle') this.renderCodePuzzle(question);
    },
    _renderQuestionMeta: function(q) {
      var labels = { easy: '🟢 简单', medium: '🟡 中等', hard: '🔴 困难' };
      document.getElementById('question-meta').innerHTML =
        '<span class="badge badge-qnum">第 ' + (DataStore.currentIndex + 1) + '/' + DataStore.quizSet.length + ' 题</span>' +
        '<span class="badge badge-difficulty">' + (labels[q.difficulty] || q.difficulty) + '</span>' +
        '<span class="badge badge-topic">' + escapeHTML(q.topic) + '</span>';
    },
    _renderQuestionText: function(q) {
      document.getElementById('question-text').textContent = q.question;
      var ctx = document.getElementById('question-context');
      if (q.context) { ctx.textContent = q.context; ctx.style.display = 'block'; }
      else { ctx.style.display = 'none'; }
    },
    renderConcept: function(q) {
      var container = document.getElementById('question-content');
      var html = '<div class="options-list">';
      q.options.forEach(function(opt, i) {
        html += '<div class="option-card" data-option-index="' + i + '">' + escapeHTML(opt) + '</div>';
      });
      html += '</div>';
      container.innerHTML = html;
      var self = this;
      container.querySelectorAll('.option-card').forEach(function(card) {
        card.addEventListener('click', function() {
          if (DataStore.submitted) return;
          container.querySelectorAll('.option-card').forEach(function(c) { c.classList.remove('selected'); });
          card.classList.add('selected');
          document.getElementById('btn-submit').disabled = false;
        });
      });
    },
    renderCodePuzzle: function(q) {
      var allBlocks = q.correct_blocks.concat(q.distractor_blocks);
      var shuffled = shuffleArray(allBlocks);
      DataStore.puzzleState = {
        poolBlocks: shuffled.map(function(text) { return { text: text, used: false }; }),
        selectedBlocks: [],
        correctBlocks: q.correct_blocks
      };
      this._renderPuzzleDOM();
    },
    _renderPuzzleDOM: function() {
      var state = DataStore.puzzleState;
      var container = document.getElementById('question-content');
      var html = '<p class="puzzle-label">📦 代码块池（点击选择）</p>';
      html += '<div class="block-pool" id="block-pool">';
      var hasAvailable = false;
      state.poolBlocks.forEach(function(block, i) {
        if (!block.used) {
          hasAvailable = true;
          html += '<div class="code-block pool-block" data-pool-index="' + i + '"><pre><code>' + escapeHTML(block.text) + '</code></pre></div>';
        }
      });
      html += '</div>';
      html += '<p class="puzzle-label">✅ 你的答案（点击退回）</p>';
      html += '<div class="block-answer" id="block-answer">';
      state.selectedBlocks.forEach(function(block, i) {
        html += '<div class="code-block answer-block" data-answer-index="' + i + '" data-order="' + (i + 1) + '"><pre><code>' + escapeHTML(block.text) + '</code></pre></div>';
      });
      html += '</div>';
      html += '<p class="hint-text">💡 按正确顺序点击代码块，构建完整代码。点击答案区的块可退回。</p>';
      container.innerHTML = html;
      this._bindPuzzleEvents();
      document.getElementById('btn-submit').disabled = (state.selectedBlocks.length === 0);
    },
    renderPuzzleAreas: function() { this._renderPuzzleDOM(); },
    _bindPuzzleEvents: function() {
      var self = this;
      var state = DataStore.puzzleState;
      if (!state) return;
      document.querySelectorAll('.pool-block').forEach(function(block) {
        block.addEventListener('click', function() {
          if (DataStore.submitted) return;
          var idx = parseInt(this.dataset.poolIndex);
          var bd = state.poolBlocks[idx];
          if (bd.used) return;
          bd.used = true;
          state.selectedBlocks.push({ text: bd.text, poolIndex: idx });
          self.renderPuzzleAreas();
        });
      });
      document.querySelectorAll('.answer-block').forEach(function(block) {
        block.addEventListener('click', function() {
          if (DataStore.submitted) return;
          var idx = parseInt(this.dataset.answerIndex);
          var removed = state.selectedBlocks.splice(idx, 1)[0];
          state.poolBlocks[removed.poolIndex].used = false;
          self.renderPuzzleAreas();
        });
      });
    },
    showFeedback: function(result) {
      var fb = document.getElementById('feedback-area');
      var icon = fb.querySelector('.feedback-icon');
      var msg = document.getElementById('feedback-msg');
      var expl = document.getElementById('explanation-text');
      fb.classList.add('show');
      if (result.correct) {
        fb.classList.add('correct'); fb.classList.remove('wrong');
        icon.textContent = '✅';
        msg.textContent = '回答正确！得分：' + (result.score >= 1 ? '1 分' : result.score.toFixed(2) + ' 分');
      } else {
        fb.classList.add('wrong'); fb.classList.remove('correct');
        icon.textContent = result.score > 0 ? '⚠️' : '❌';
        msg.textContent = result.score > 0
          ? '部分正确（' + (result.score * 100).toFixed(0) + '%），继续加油！'
          : '回答错误，看看正确答案吧。';
      }
      expl.textContent = '💡 ' + result.explanation;
      document.getElementById('btn-submit').style.display = 'none';
      document.getElementById('btn-skip').style.display = 'none';
      document.getElementById('btn-next').style.display = '';
    },
    updateProgress: function() {
      var total = DataStore.quizSet.length;
      var current = DataStore.currentIndex;
      document.getElementById('progress-bar').style.width = (total > 0 ? (current / total * 100) : 0) + '%';
      document.getElementById('progress-text').textContent = '第 ' + (current + 1) + '/' + total + ' 题';
      document.getElementById('score-display').textContent = '得分：' + DataStore.score.toFixed(1);
    },
    renderResults: function(results) {
      document.getElementById('result-score').textContent = results.score.toFixed(1);
      document.getElementById('result-total').textContent = '/' + results.total;
      document.getElementById('result-percent').textContent = results.percent.toFixed(0) + '%';
      var gradeEl = document.getElementById('result-grade');
      gradeEl.textContent = results.grade;
      gradeEl.className = 'grade grade-' + results.grade.toLowerCase();
      var icon = document.getElementById('result-icon');
      if (results.percent >= 90) icon.textContent = '🏆';
      else if (results.percent >= 80) icon.textContent = '🎉';
      else if (results.percent >= 60) icon.textContent = '👍';
      else icon.textContent = '📚';

      var diffDiv = document.getElementById('breakdown-difficulty');
      diffDiv.innerHTML = '<h3>📊 按难度</h3>';
      var diffLabels = { easy: '🟢 简单', medium: '🟡 中等', hard: '🔴 困难' };
      Object.keys(diffLabels).forEach(function(key) {
        var d = results.byDifficulty[key] || { correct: 0, total: 0 };
        var pct = d.total > 0 ? (d.correct / d.total * 100).toFixed(0) : '-';
        diffDiv.innerHTML += '<div class="breakdown-row"><span>' + diffLabels[key] + '</span><span class="b-score">' + d.correct.toFixed(1) + '/' + d.total + (pct !== '-' ? ' (' + pct + '%)' : '') + '</span></div>';
      });

      var topicDiv = document.getElementById('breakdown-topic');
      topicDiv.innerHTML = '<h3>📚 按知识点</h3>';
      ['基础概念', '经典算法', '神经网络基础'].forEach(function(key) {
        var d = results.byTopic[key] || { correct: 0, total: 0 };
        var pct = d.total > 0 ? (d.correct / d.total * 100).toFixed(0) : '-';
        topicDiv.innerHTML += '<div class="breakdown-row"><span>' + key + '</span><span class="b-score">' + d.correct.toFixed(1) + '/' + d.total + (pct !== '-' ? ' (' + pct + '%)' : '') + '</span></div>';
      });

      var reviewList = document.getElementById('review-list');
      var wrongAnswers = results.answers.filter(function(a) { return a.score < 1; });
      if (wrongAnswers.length === 0) {
        reviewList.innerHTML = '<p style="color:var(--color-correct);text-align:center;padding:16px;">🎉 全部正确！太棒了！</p>';
      } else {
        reviewList.innerHTML = wrongAnswers.map(function(a, i) {
          var userAnsHTML = '';
          if (a.question.type === 'concept') {
            userAnsHTML = escapeHTML(a.question.options[a.userAnswer] || '未作答');
          } else {
            userAnsHTML = (a.userAnswer || []).map(function(b) { return '<code style="font-size:12px;">' + escapeHTML(b.text || b) + '</code>'; }).join(' → ') || '未作答';
          }
          var correctAnsHTML = '';
          if (a.question.type === 'concept') {
            correctAnsHTML = escapeHTML(a.question.options[a.question.correct]);
          } else {
            correctAnsHTML = a.question.correct_blocks.map(function(b) { return '<code style="font-size:12px;">' + escapeHTML(b) + '</code>'; }).join(' → ');
          }
          return '<div class="review-item"><div class="review-item-header"><span>Q' + (DataStore.quizSet.indexOf(a.question) + 1) + ': ' + escapeHTML(a.question.question.substring(0, 40)) + '...</span><span class="review-icon">▼</span></div><div class="review-item-body"><p class="rv-label">你的答案：</p><p class="rv-wrong">' + userAnsHTML + '</p><p class="rv-label">正确答案：</p><p class="rv-correct">' + correctAnsHTML + '</p><p class="rv-label">解析：</p><p>' + escapeHTML(a.question.explanation) + '</p></div></div>';
        }).join('');
        reviewList.querySelectorAll('.review-item-header').forEach(function(header) {
          header.addEventListener('click', function() { this.parentElement.classList.toggle('open'); });
        });
      }
    }
  };

  // ============================================================
  // QuizEngine
  // ============================================================
  var QuizEngine = {
    startQuiz: function() {
      var settings = DataStore.settings;
      var filtered = QuestionBank.filter(settings.difficulty, settings.topics);
      if (filtered.length === 0) { alert('当前筛选条件下没有题目，请调整筛选。'); return; }

      // 边界处理：题量超过可用题数时自动调整
      var count = settings.questionCount;
      var actualCount;
      if (count === 'all') {
        actualCount = filtered.length;
      } else {
        actualCount = Math.min(count, filtered.length);
      }
      if (count !== 'all' && count > filtered.length) {
        alert('可用题目仅 ' + filtered.length + ' 道，已将题目数量自动调整为 ' + actualCount + ' 道。');
      }

      DataStore.resetQuiz();
      DataStore.quizSet = QuestionBank.selectRandom(actualCount, filtered);
      UIRenderer.showScreen('quiz');
      UIRenderer.renderQuiz(DataStore.quizSet[0]);
    },
    getCurrentQuestion: function() { return DataStore.quizSet[DataStore.currentIndex]; },
    submitAnswer: function() {
      if (DataStore.submitted) return;
      DataStore.submitted = true;
      var q = this.getCurrentQuestion();
      var result;
      if (q.type === 'concept') {
        var selected = document.querySelector('.option-card.selected');
        var userAnswer = selected ? parseInt(selected.dataset.optionIndex) : -1;
        result = this._checkConcept(q, userAnswer);
        result.userAnswer = userAnswer;
        this._highlightConceptAnswer(q, userAnswer);
      } else if (q.type === 'codepuzzle') {
        var state = DataStore.puzzleState;
        var userBlocks = state ? state.selectedBlocks : [];
        result = this._checkPuzzle(q, userBlocks);
        result.userAnswer = userBlocks;
        this._highlightPuzzleAnswer(q, state);
      }
      DataStore.answers.push({ id: q.id, question: q, userAnswer: result.userAnswer, correct: result.correct, score: result.score });
      DataStore.score += result.score;
      UIRenderer.updateProgress();
      UIRenderer.showFeedback(result);
    },
    _checkConcept: function(q, userAnswer) {
      var correct = (userAnswer === q.correct);
      return { correct: correct, score: correct ? 1 : 0, explanation: q.explanation };
    },
    _checkPuzzle: function(q, userBlocks) {
      var correctBlocks = q.correct_blocks;
      var userTexts = userBlocks.map(function(b) { return b.text || b; });
      var matched = 0;
      for (var i = 0; i < Math.min(userTexts.length, correctBlocks.length); i++) {
        if (userTexts[i] === correctBlocks[i]) matched++;
      }
      var score = correctBlocks.length > 0 ? matched / correctBlocks.length : 0;
      return { correct: score >= 1, score: score, explanation: q.explanation };
    },
    _highlightConceptAnswer: function(q, userAnswer) {
      var cards = document.querySelectorAll('.option-card');
      cards.forEach(function(c) { c.classList.add('disabled'); });
      cards[q.correct].classList.add('correct');
      if (userAnswer >= 0 && userAnswer !== q.correct) cards[userAnswer].classList.add('wrong');
    },
    _highlightPuzzleAnswer: function(q, state) {
      var correctBlocks = q.correct_blocks;
      document.querySelectorAll('.answer-block').forEach(function(block, i) {
        var userText = state.selectedBlocks[i] ? state.selectedBlocks[i].text : '';
        if (i < correctBlocks.length && userText === correctBlocks[i]) block.classList.add('correct-block');
        else block.classList.add('wrong-block');
      });
      document.querySelectorAll('.pool-block, .answer-block').forEach(function(b) { b.style.pointerEvents = 'none'; });
    },
    nextQuestion: function() {
      DataStore.currentIndex++;
      if (DataStore.currentIndex >= DataStore.quizSet.length) this._finishQuiz();
      else UIRenderer.renderQuiz(DataStore.quizSet[DataStore.currentIndex]);
    },
    skipQuestion: function() {
      var q = this.getCurrentQuestion();
      DataStore.answers.push({ id: q.id, question: q, userAnswer: (q.type === 'concept') ? -1 : [], correct: false, score: 0 });
      DataStore.currentIndex++;
      if (DataStore.currentIndex >= DataStore.quizSet.length) this._finishQuiz();
      else UIRenderer.renderQuiz(DataStore.quizSet[DataStore.currentIndex]);
    },
    _finishQuiz: function() {
      var results = this.calculateResults();
      UIRenderer.showScreen('results');
      UIRenderer.renderResults(results);
    },
    calculateResults: function() {
      var answers = DataStore.answers;
      var total = answers.length;
      var scoreSum = 0;
      var byDifficulty = {};
      var byTopic = {};
      answers.forEach(function(a) {
        scoreSum += a.score;
        var diff = a.question.difficulty;
        var topic = a.question.topic;
        if (!byDifficulty[diff]) byDifficulty[diff] = { correct: 0, total: 0 };
        byDifficulty[diff].correct += a.score;
        byDifficulty[diff].total += 1;
        if (!byTopic[topic]) byTopic[topic] = { correct: 0, total: 0 };
        byTopic[topic].correct += a.score;
        byTopic[topic].total += 1;
      });
      var percent = total > 0 ? (scoreSum / total * 100) : 0;
      var grade = 'F';
      if (percent >= 90) grade = 'A'; else if (percent >= 80) grade = 'B'; else if (percent >= 70) grade = 'C'; else if (percent >= 60) grade = 'D';
      return { score: scoreSum, total: total, percent: percent, grade: grade, byDifficulty: byDifficulty, byTopic: byTopic, answers: answers };
    }
  };

  // ============================================================
  // EventHandler
  // ============================================================
  var EventHandler = {
    init: function() {
      var self = this;
      // 难度筛选
      document.querySelectorAll('#difficulty-pills .pill').forEach(function(pill) {
        pill.addEventListener('click', function() {
          document.querySelectorAll('#difficulty-pills .pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          DataStore.settings.difficulty = pill.dataset.value;
          UIRenderer.updateFilterWarn();
        });
      });
      // 知识点筛选
      document.querySelectorAll('#topic-pills .pill').forEach(function(pill) {
        pill.addEventListener('click', function() {
          pill.classList.toggle('active');
          var active = document.querySelectorAll('#topic-pills .pill.active');
          DataStore.settings.topics = Array.from(active).map(function(p) { return p.dataset.value; });
          UIRenderer.updateFilterWarn();
        });
      });
      // 题目数量
      var countSelect = document.getElementById('question-count');
      if (countSelect) {
        countSelect.addEventListener('change', function() {
          DataStore.settings.questionCount = countSelect.value === 'all' ? 'all' : parseInt(countSelect.value);
        });
      }
      // 开始
      document.getElementById('btn-start').addEventListener('click', function() { QuizEngine.startQuiz(); });
      // 导入
      document.getElementById('btn-import').addEventListener('click', function() { document.getElementById('import-file').click(); });
      document.getElementById('import-file').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          try {
            var json = JSON.parse(ev.target.result);
            var result = QuestionBank.importFromJSON(json);
            var status = document.getElementById('import-status');
            if (result.errors && result.errors.length > 0) {
              status.textContent = '已导入 ' + result.count + ' 道，' + result.errors.length + ' 道格式错误（详见 Console）';
              console.warn('题目导入错误:', result.errors);
            } else { status.textContent = '✅ 成功导入 ' + result.count + ' 道题目'; }
            UIRenderer.updateAvailableCount();
            UIRenderer.updateFilterWarn();
          } catch (err) { document.getElementById('import-status').textContent = '❌ JSON 解析失败：' + err.message; }
        };
        reader.readAsText(file);
        e.target.value = '';
      });
      // 提交
      document.getElementById('btn-submit').addEventListener('click', function() { QuizEngine.submitAnswer(); });
      // 下一题
      document.getElementById('btn-next').addEventListener('click', function() { QuizEngine.nextQuestion(); });
      // 跳过
      document.getElementById('btn-skip').addEventListener('click', function() { QuizEngine.skipQuestion(); });
      // 再来一次
      document.getElementById('btn-play-again').addEventListener('click', function() { QuizEngine.startQuiz(); });
      // 返回首页
      document.getElementById('btn-home').addEventListener('click', function() {
        UIRenderer.showScreen('home');
        UIRenderer.updateAvailableCount();
        UIRenderer.updateFilterWarn();
      });
      // 键盘快捷键
      document.addEventListener('keydown', function(e) {
        if (['1','2','3','4'].indexOf(e.key) !== -1 && !DataStore.submitted) {
          var q = DataStore.quizSet[DataStore.currentIndex];
          if (q && q.type === 'concept') {
            var cards = document.querySelectorAll('.option-card');
            var idx = parseInt(e.key) - 1;
            if (cards[idx]) {
              cards.forEach(function(c) { c.classList.remove('selected'); });
              cards[idx].classList.add('selected');
              document.getElementById('btn-submit').disabled = false;
            }
          }
        }
        if (e.key === 'Enter') {
          if (DataStore.submitted) { QuizEngine.nextQuestion(); }
          else if (!document.getElementById('btn-submit').disabled) { QuizEngine.submitAnswer(); }
        }
      });
      console.log('✅ ML Quiz 初始化完成！题库：' + DataStore.questions.length + ' 道');
    }
  };

  // ============================================================
  // 启动
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    QuestionBank.loadDefaults();
    UIRenderer.updateAvailableCount();
    EventHandler.init();
  });

  window.MLQuiz = { DataStore: DataStore, QuestionBank: QuestionBank, UIRenderer: UIRenderer, QuizEngine: QuizEngine, EventHandler: EventHandler };
})();
</script>
